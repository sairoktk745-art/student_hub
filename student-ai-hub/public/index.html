<!DOCTYPE html>
<html>
<head>
  <title>Student AI Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>🎓 Student AI Hub</h2>
</div>

<div class="container">

  <div class="card">
    <h3>🤖 AI Friend</h3>
    <textarea id="msg" placeholder="Feeling stressed? Talk to me..."></textarea>
    <button onclick="askAI()">Send</button>
    <p id="reply"></p>
  </div>

  <div class="card">
    <h3>👥 People</h3>
    <ul id="peopleList"></ul>
  </div>

  <div class="card">
    <h3>🎤 Voice Rooms</h3>
    <button>Join Chill Room</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
